name: Build README

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Configure pip caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build database
        run: python build_database.py
      - name: Update README
        run: |-
          python update_readme.py --rewrite
          cat README.md
      - name: Update subdir README's
        run: |-
          for dir in */; do
            dir="${dir%/}"
            # Skip hidden dirs and non-TIL directories
            if [[ "$dir" == .* ]] || [[ "$dir" == scripts ]]; then
              continue
            fi
            # Only process dirs that contain .md files (besides README.md)
            if ls "$dir"/*.md 2>/dev/null | grep -qv README.md; then
              python3 scripts/build_subdir_toc.py "$dir"
            fi
          done
      - name: Commit and push if anything changed
        run: |-
          git diff
          git config --global user.email "readme-bot@example.com"
          git config --global user.name "README-bot"
          git diff --quiet || (git add README.md */README.md && git commit -m "Updated READMEs")
          git push
